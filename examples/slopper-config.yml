# Example .slopper config file — copy to your repo root as ".slopper"

vouched:
  - dependabot[bot]
  - renovate[bot]

banned: []

actions:
  auto_close:
    enabled: false
    threshold: 9
  auto_approve:
    enabled: false
    threshold: 2
  auto_request_review:
    enabled: false
    threshold: 6
    reviewers: []

thresholds:
  low: 2
  medium: 5
  high: 8

# Tune when each label fires
label_thresholds:
  ai_likely: 70           # slopper/likely-ai-generated
  ai_possibly: 40         # slopper/possibly-ai-generated
  spray_score: 60         # slopper/spray-and-pray
  new_account_days: 30    # slopper/new-account
  activity_burst_prs: 10  # slopper/activity-burst

ignore_paths:
  - "*.md"
  - "docs/**"
  - "*.lock"

rules:
  require_description: true
  require_linked_issue: false
  max_files_changed: 0
