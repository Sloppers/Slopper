# Example .slopper config file — copy to your repo root as ".slopper"

vouched:
  - dependabot[bot]
  - renovate[bot]

banned: []

actions:
  auto_close:
    enabled: false
    threshold: 9
  auto_approve:
    enabled: false
    threshold: 2
  auto_request_review:
    enabled: false
    threshold: 6
    reviewers: []

thresholds:
  low: 2
  medium: 5
  high: 8

# Tune when each label fires
label_thresholds:
  ai_likely: 70              # slopper/likely-ai-generated
  ai_possibly: 40            # slopper/possibly-ai-generated
  spray_score: 60            # slopper/spray-and-pray
  new_account_days: 30       # slopper/new-account
  activity_burst_prs: 10     # slopper/activity-burst
  activity_burst_days: 7     # window for burst detection
  merge_ratio_suspect: 0.4   # merge ratio below this feeds spray score
  security_review_score: 6   # slopper/needs-security-review
  suspicious_score: 8        # slopper/suspicious
  spray_weights:             # how spray score is calculated (max points per signal)
    repos: 40                # distinct repos in 30d
    volume: 30               # PR volume in 30d
    merge_ratio: 20          # low merge ratio penalty
    account_age: 10          # new account penalty

ignore_paths:
  - "*.md"
  - "docs/**"
  - "*.lock"

rules:
  require_description: true
  require_linked_issue: false
  max_files_changed: 0
