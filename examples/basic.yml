# Minimal setup — deterministic heuristics only, no API keys needed.
name: Slopper
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      id-token: write
    steps:
      - uses: Sloppers/Slopper@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
